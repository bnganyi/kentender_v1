boq_item_schema:
  - schema_field_code: DOC1-BOQ-FIELD-QUANTITY
    boq_definition_code: DOC1-WORKS-BUILDING-BOQ-DEFINITION
    field_key: quantity
    label: Quantity
    item_owner: Procuring Entity
    supplier_editable: false
    required: true
  - schema_field_code: DOC1-BOQ-FIELD-RATE
    boq_definition_code: DOC1-WORKS-BUILDING-BOQ-DEFINITION
    field_key: rate
    label: Rate
    item_owner: Tenderer
    supplier_editable: true
    required: true
  - schema_field_code: DOC1-BOQ-FIELD-AMOUNT
    boq_definition_code: DOC1-WORKS-BUILDING-BOQ-DEFINITION
    field_key: amount
    label: Amount
    item_owner: System
    supplier_editable: false
    required: true
    computation_rule: quantity * rate
